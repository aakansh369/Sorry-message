<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  height:100vh;
  background: linear-gradient(45deg,#ff9a9e,#fad0c4);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* MAIN BOX */
.container{
  z-index:2;
}

h1{
  font-size:55px;
  margin:0;
}

#typing{
  font-size:28px;
  margin-top:20px;
  min-height:40px;
}

/* Floating hearts */
.heart{
  position:absolute;
  bottom:-20px;
  color:#ff4d6d;
  font-size:20px;
  animation: float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0) rotate(0);}
  100%{transform:translateY(-110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="container">
  <h1>I LOVE YOU ❤️</h1>
  <div id="typing"></div>
</div>

<script>
// Typing message
let msg = "Sorry meri jaan 🥺\nMujhse galti ho gayi...\nPlease gussa mat ho ❤️\nYou mean everything to me 💖";
let i=0;
function typing(){
  if(i < msg.length){
    document.getElementById("typing").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typing,60);
  }
}
typing();

// popup after open
setTimeout(()=>{
  alert("Sorry meri jaan 🥺💖");
},800);

// floating hearts generator
function hearts(){
  let heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}
setInterval(hearts,300);
</script>

</body>
</html>
